<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BuiltSELL — Web & App Development</title>
<meta name="description" content="BuiltSELL builds fast websites, mobile apps, and custom software. Tap a link below to start your project." />
<meta name="theme-color" content="#0b0f1a" />

<meta property="og:title" content="BuiltSELL — Web & App Development" />
<meta property="og:description" content="We design and build websites, mobile apps & custom software. Let's build yours." />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0b0f1a;
    --card: rgba(255, 255, 255, 0.05);
    --card-hover: rgba(255, 255, 255, 0.1);
    --border: rgba(255, 255, 255, 0.12);
    --text: #f4f6fb;
    --muted: #9aa6c2;
    --accent: #5b8cff;
    --accent-2: #7c5bff;
    --glow: rgba(91, 140, 255, 0.45);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(124, 91, 255, 0.25), transparent 60%),
      radial-gradient(900px 500px at 90% 10%, rgba(91, 140, 255, 0.18), transparent 55%),
      var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px 64px;
    -webkit-font-smoothing: antialiased;
  }

  .wrap { width: 100%; max-width: 440px; display: flex; flex-direction: column; align-items: center; gap: 26px; }

  /* Brand */
  .brand { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; }
  .logo {
    width: 84px; height: 84px; border-radius: 22px; display: grid; place-items: center;
    font-weight: 800; font-size: 30px; letter-spacing: -1px; color: #fff;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow: 0 12px 40px var(--glow), inset 0 1px 0 rgba(255,255,255,0.35);
    overflow: hidden;
  }
  .logo img { width: 100%; height: 100%; object-fit: cover; }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
  h1 span { color: var(--accent); }
  .tagline { color: var(--muted); font-size: 15px; line-height: 1.5; max-width: 320px; }
  .pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 2px; }
  .pill { font-size: 12px; font-weight: 600; color: var(--muted); border: 1px solid var(--border); background: var(--card); padding: 6px 12px; border-radius: 999px; }

  /* Links */
  .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }
  .link {
    display: flex; align-items: center; gap: 16px; width: 100%; padding: 16px 18px;
    border-radius: 16px; background: var(--card); border: 1px solid var(--border);
    color: var(--text); text-decoration: none;
    transition: transform 0.15s ease, background 0.2s ease, border-color 0.2s ease;
    backdrop-filter: blur(6px);
  }
  .link:hover { transform: translateY(-2px); background: var(--card-hover); border-color: var(--accent); }
  .link .ic { flex: 0 0 auto; width: 44px; height: 44px; border-radius: 12px; display: grid; place-items: center;
    background: linear-gradient(135deg, rgba(91,140,255,0.25), rgba(124,91,255,0.25)); border: 1px solid var(--border); }
  .link .ic svg { width: 22px; height: 22px; }
  .link .txt { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .link .title { font-weight: 600; font-size: 15px; }
  .link .sub { font-size: 12.5px; color: var(--muted); }
  .link .chev { color: var(--muted); flex: 0 0 auto; }
  .link.primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); border-color: transparent; box-shadow: 0 10px 30px var(--glow); }
  .link.primary .ic { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.25); }
  .link.primary .sub { color: rgba(255,255,255,0.85); }
  .link.primary .chev { color: rgba(255,255,255,0.9); }

  /* Portfolio */
  .section-title { width: 100%; font-size: 14px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--muted); margin-top: 6px; }
  .portfolio { width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .proj {
    border-radius: 14px; overflow: hidden; background: var(--card); border: 1px solid var(--border);
    text-decoration: none; color: var(--text); display: flex; flex-direction: column;
    transition: transform 0.15s ease, border-color 0.2s ease;
  }
  .proj:hover { transform: translateY(-2px); border-color: var(--accent); }
  .proj .thumb { aspect-ratio: 16/10; background: linear-gradient(135deg, rgba(91,140,255,0.3), rgba(124,91,255,0.3)); display: grid; place-items: center; }
  .proj .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .proj .thumb span { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.8); letter-spacing: 1px; }
  .proj .meta { padding: 12px 14px; display: flex; flex-direction: column; gap: 4px; }
  .proj .cat { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--accent); }
  .proj .name { font-size: 14px; font-weight: 600; }
  .proj .desc { font-size: 12px; color: var(--muted); line-height: 1.4; }

  /* Socials */
  .socials { display: flex; gap: 14px; margin-top: 4px; flex-wrap: wrap; justify-content: center; }
  .socials a { width: 46px; height: 46px; border-radius: 12px; display: grid; place-items: center;
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    transition: transform 0.15s ease, border-color 0.2s ease, background 0.2s ease; }
  .socials a:hover { transform: translateY(-2px); border-color: var(--accent); background: var(--card-hover); }
  .socials svg { width: 20px; height: 20px; fill: currentColor; }

  footer { color: var(--muted); font-size: 12px; text-align: center; margin-top: 8px; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
  <main class="wrap">
    <section class="brand">
      <div class="logo" id="logo"></div>
      <h1 id="brandName"></h1>
      <p class="tagline" id="tagline"></p>
      <div class="pills" id="pills"></div>
    </section>

    <nav class="links" id="links"></nav>

    <h2 class="section-title" id="portfolio">Our Work</h2>
    <section class="portfolio" id="portfolio-grid"></section>

    <div class="socials" id="socials"></div>

    <footer>
      © <span id="yr"></span> BuiltSELL · Built with care · <a href="admin.html">Admin</a>
    </footer>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    loadContent().then(render);

    function render(data) {

    /* Brand */
    const logo = document.getElementById('logo');
    if (data.brand.logoImage) {
      logo.innerHTML = `<img src="${data.brand.logoImage}" alt="logo">`;
    } else {
      logo.textContent = data.brand.logoText || 'BS';
    }
    document.getElementById('brandName').innerHTML =
      `${escapeHtml(data.brand.name)}<span>${escapeHtml(data.brand.accentWord)}</span>`;
    document.getElementById('tagline').textContent = data.brand.tagline;

    document.getElementById('pills').innerHTML =
      (data.pills || []).map(p => `<span class="pill">${escapeHtml(p)}</span>`).join('');

    /* Links */
    document.getElementById('links').innerHTML = (data.links || []).map(l => `
      <a class="link ${l.primary ? 'primary' : ''}" href="${escapeAttr(l.url)}" data-link="${l.id}">
        <span class="ic">${iconSvg(l.icon)}</span>
        <span class="txt">
          <span class="title">${escapeHtml(l.title)}</span>
          ${l.sub ? `<span class="sub">${escapeHtml(l.sub)}</span>` : ''}
        </span>
        <span class="chev">›</span>
      </a>`).join('');

    /* Portfolio */
    const grid = document.getElementById('portfolio-grid');
    const projects = data.projects || [];
    if (!projects.length) {
      document.getElementById('portfolio').style.display = 'none';
      grid.style.display = 'none';
    } else {
      grid.innerHTML = projects.map(p => `
        <a class="proj" href="${escapeAttr(p.url || '#')}" ${p.url && p.url !== '#' ? 'target="_blank" rel="noopener"' : ''}>
          <div class="thumb">
            ${p.image ? `<img src="${escapeAttr(p.image)}" alt="${escapeAttr(p.title)}">` : `<span>${escapeHtml((p.category || 'PROJECT').toUpperCase())}</span>`}
          </div>
          <div class="meta">
            <span class="cat">${escapeHtml(p.category || '')}</span>
            <span class="name">${escapeHtml(p.title)}</span>
            ${p.description ? `<span class="desc">${escapeHtml(p.description)}</span>` : ''}
          </div>
        </a>`).join('');
    }

    /* Socials */
    const S = data.socials || {};
    const socialDefs = [
      ['instagram', S.instagram, 'M12 2.2c3.2 0 3.6 0 4.9.07 1.2.06 1.8.25 2.2.42.6.2 1 .5 1.4.9.4.4.7.8.9 1.4.17.4.36 1 .42 2.2.06 1.3.07 1.7.07 4.9s0 3.6-.07 4.9c-.06 1.2-.25 1.8-.42 2.2-.2.6-.5 1-.9 1.4-.4.4-.8.7-1.4.9-.4.17-1 .36-2.2.42-1.3.06-1.7.07-4.9.07s-3.6 0-4.9-.07c-1.2-.06-1.8-.25-2.2-.42-.6-.2-1-.5-1.4-.9-.4-.4-.7-.8-.9-1.4-.17-.4-.36-1-.42-2.2C2.2 15.6 2.2 15.2 2.2 12s0-3.6.07-4.9c.06-1.2.25-1.8.42-2.2.2-.6.5-1 .9-1.4.4-.4.8-.7 1.4-.9.4-.17 1-.36 2.2-.42C8.4 2.2 8.8 2.2 12 2.2zm0 1.8c-3.1 0-3.5 0-4.7.07-.9.04-1.4.2-1.7.3-.4.17-.7.37-1 .67-.3.3-.5.6-.67 1-.1.3-.26.8-.3 1.7C3.3 8.5 3.3 8.9 3.3 12s0 3.5.07 4.7c.04.9.2 1.4.3 1.7.17.4.37.7.67 1 .3.3.6.5 1 .67.3.1.8.26 1.7.3 1.2.07 1.6.07 4.7.07s3.5 0 4.7-.07c.9-.04 1.4-.2 1.7-.3.4-.17.7-.37 1-.67.3-.3.5-.6.67-1 .1-.3.26-.8.3-1.7.07-1.2.07-1.6.07-4.7s0-3.5-.07-4.7c-.04-.9-.2-1.4-.3-1.7-.17-.4-.37-.7-.67-1-.3-.3-.6-.5-1-.67-.3-.1-.8-.26-1.7-.3C15.5 4 15.1 4 12 4zm0 3.1a4.9 4.9 0 1 1 0 9.8 4.9 4.9 0 0 1 0-9.8zm0 1.8a3.1 3.1 0 1 0 0 6.2 3.1 3.1 0 0 0 0-6.2zm5.1-.6a1.15 1.15 0 1 1 0 2.3 1.15 1.15 0 0 1 0-2.3z'],
      ['x', S.x, 'M18.9 2H22l-7.3 8.3L23 22h-6.8l-5.3-6.9L4.8 22H1.7l7.8-8.9L1 2h7l4.8 6.3L18.9 2zm-2.4 18h1.9L7.6 4H5.6l10.9 16z'],
      ['linkedin', S.linkedin, 'M4.98 3.5a2.5 2.5 0 1 1 0 5 2.5 2.5 0 0 1 0-5zM3 9h4v12H3zM10 9h3.8v1.7h.05c.53-1 1.8-2 3.7-2 4 0 4.7 2.6 4.7 6V21h-4v-5.3c0-1.3 0-3-1.8-3s-2.1 1.4-2.1 2.9V21h-4z'],
      ['email', S.email ? 'mailto:' + S.email : '', 'M3 5h18a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1zm1.2 2L12 12l7.8-5z'],
      ['whatsapp', S.whatsapp, 'M21 11.5a8.5 8.5 0 0 1-12.7 7.4L3 21l2.2-5.2A8.5 8.5 0 1 1 21 11.5z']
    ];
    document.getElementById('socials').innerHTML = socialDefs
      .filter(([, url]) => url && url !== '#')
      .map(([name, url, path]) => `<a href="${escapeAttr(url)}" aria-label="${name}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24"><path d="${path}"/></svg></a>`)
      .join('');

    /* Tracking hook */
    document.querySelectorAll('[data-link]').forEach(el =>
      el.addEventListener('click', () => console.log('link click:', el.dataset.link)));
    }

    function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
    function escapeAttr(s) { return escapeHtml(s); }
  </script>
</body>
</html>
